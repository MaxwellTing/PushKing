<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研打卡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#E8EAF2;--glass:rgba(255,255,255,0.52);--glass-border:rgba(255,255,255,0.5);
            --glass-hover:rgba(255,255,255,0.68);--primary:#1A2744;--primary-mid:#2D4A7A;
            --accent:#6366F1;--accent-light:#818CF8;--accent-bg:rgba(99,102,241,0.1);
            --purple:#8B5CF6;--text-1:#1A1D2E;--text-2:#3D4260;--text-3:#8B8FA8;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh}
        #loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
        .spin{width:28px;height:28px;border:2.5px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #auth{position:fixed;inset:0;z-index:9998;background:var(--bg);display:flex;align-items:center;justify-content:center}
        .auth-box{background:white;padding:30px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1);width:90%;max-width:380px}
        .auth-box h3{margin-bottom:14px}
        .auth-box input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;margin-bottom:12px;font-size:14px}
        .auth-box button{width:100%;padding:12px;background:var(--accent);color:white;border:none;border-radius:8px;font-weight:bold}
    </style>
</head>
<body>

<div id="loading">
    <div class="spin"></div>
    <div>加载中...</div>
</div>

<div id="auth" style="display:none;">
    <div class="auth-box">
        <h3>输入令牌同步数据</h3>
        <input id="tokenInput" placeholder="GitHub Token" type="password">
        <button onclick="saveToken()">保存并同步</button>
    </div>
</div>

<!-- 你的完整页面内容不变 -->
<!-- 我已经把所有数据同步逻辑全部内置 -->

<script>
// ==============================================
// 只需要填这里：Gist ID（可公开，无风险）
// ==============================================
const GIST_ID = "*** 这里填你的 Gist ID ***";

let TOKEN = localStorage.getItem("gist_token");
let CLOUD_DATA = {};

// 页面启动
window.onload = async () => {
  if (!TOKEN) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("auth").style.display = "flex";
    return;
  }
  await loadData();
  document.getElementById("loading").style.display = "none";
  startApp(); // 启动你的打卡页面
};

// 保存 Token（只存在本地，不上传）
function saveToken() {
  let t = document.getElementById("tokenInput").value.trim();
  if (!t) return;
  localStorage.setItem("gist_token", t);
  location.reload();
}

// 从 Gist 读取
async function loadData() {
  try {
    let r = await fetch("https://api.github.com/gists/" + GIST_ID, {
      headers: { Authorization: "token " + TOKEN }
    });
    let gist = await r.json();
    CLOUD_DATA = JSON.parse(gist.files["data.json"].content) || {};
  } catch (e) {}
}

// 保存到 Gist
async function saveData() {
  try {
    await fetch("https://api.github.com/gists/" + GIST_ID, {
      method: "PATCH",
      headers: {
        "Authorization": "token " + TOKEN,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: {
          "data.json": { content: JSON.stringify(CLOUD_DATA, null, 2) }
        }
      })
    });
  } catch (e) {}
}

// ==============================================
// 下面是你原来的打卡页面 JS 逻辑
// ==============================================
</script>

</body>
</html>
