<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研打卡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg:#E8EAF2;--glass:rgba(255,255,255,0.52);--glass-border:rgba(255,255,255,0.5);
            --glass-hover:rgba(255,255,255,0.68);--primary:#1A2744;--primary-mid:#2D4A7A;
            --accent:#6366F1;--accent-light:#818CF8;--accent-bg:rgba(99,102,241,0.1);
            --purple:#8B5CF6;--text-1:#1A1D2E;--text-2:#3D4260;--text-3:#8B8FA8;
            --sep:rgba(60,64,90,0.06);--sep-full:rgba(60,64,90,0.12);
            --fill:rgba(120,124,160,0.08);
            --morning:#4A90A4;--morning-bg:rgba(74,144,164,0.12);
            --afternoon:#5A8F5C;--afternoon-bg:rgba(90,143,92,0.12);
            --evening:#A06878;--evening-bg:rgba(160,104,120,0.12);
            --chores:#C4A44D;--chores-bg:rgba(196,164,77,0.12);
            --phone:#C47474;--phone-bg:rgba(196,116,116,0.12);
        }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
        .blob{position:fixed;border-radius:50%;pointer-events:none;filter:blur(90px);z-index:0}
        .b1{width:520px;height:520px;top:-140px;right:-100px;background:rgba(99,102,241,0.2)}
        .b2{width:460px;height:460px;bottom:-120px;left:-80px;background:rgba(139,92,246,0.16)}
        .b3{width:320px;height:320px;top:45%;left:35%;background:rgba(91,127,204,0.1)}
        #ls{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
        .sp{width:28px;height:28px;border:2.5px solid var(--sep-full);border-top-color:var(--accent);border-radius:50%;animation:spin .55s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #auth{position:fixed;inset:0;z-index:9998;background:var(--bg);display:flex;align-items:center;justify-content:center}
        .auth-box{background:white;padding:32px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);width:90%;max-width:400px}
        .auth-box h3{margin-bottom:16px;font-size:18px}
        .auth-box input{width:100%;padding:14px;border:1px solid #ddd;border-radius:12px;margin-bottom:14px;font-size:14px}
        .auth-box button{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:12px;font-weight:600;font-size:15px}
        #bar{position:sticky;top:0;z-index:100;background:rgba(232,234,242,0.6);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-bottom:.5px solid var(--glass-border)}
        .bar-in{max-width:1180px;margin:0 auto;padding:12px 28px;display:flex;align-items:center;justify-content:space-between}
        .bar-t{font-size:17px;font-weight:600;display:flex;align-items:center;gap:8px}
        .bar-t i{color:var(--accent);font-size:15px}
        .bar-r{display:flex;align-items:center;gap:14px}
        .bar-d{font-size:13px;color:var(--text-3)}
        .streak-badge{font-size:12px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:4px;background:var(--accent-bg);padding:3px 10px;border-radius:20px}
        .streak-badge i{font-size:11px}
        .g{background:var(--glass);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%);border:1px solid var(--glass-border);border-radius:18px;box-shadow:0 4px 24px rgba(26,39,68,0.04),inset 0 .5px 0 rgba(255,255,255,0.55);transition:background .2s,box-shadow .25s}
        .g:hover{background:var(--glass-hover);box-shadow:0 6px 32px rgba(26,39,68,0.06),inset 0 .5px 0 rgba(255,255,255,0.6)}
        .mg{display:grid;grid-template-columns:370px 1fr;gap:18px;align-items:start}
        .lc{display:flex;flex-direction:column;gap:14px;position:sticky;top:64px}
        .rc{display:flex;flex-direction:column;gap:14px}
        .mn{font-family:'Space Mono',monospace;font-variant-numeric:tabular-nums;letter-spacing:.5px}
        .bt{height:4px;background:var(--fill);border-radius:2px;overflow:hidden}
        .bf{height:100%;border-radius:2px;transition:width .5s ease}
        .pd{width:6px;height:6px;border-radius:50%;background:var(--accent-light);opacity:0;transition:opacity .2s;flex-shrink:0}
        .pd.on{opacity:1;animation:pulse 1.2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
        .bi{padding:5px 13px;border-radius:8px;font-size:12px;font-weight:500;background:var(--accent-bg);color:var(--accent);border:none;cursor:pointer;font-family:inherit;transition:all .15s;white-space:nowrap}
        .bi:active{transform:scale(.94);opacity:.7}
        .bi.ac{background:var(--accent);color:#fff}
        .bp{width:100%;padding:13px;border-radius:12px;font-size:15px;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:0 4px 18px rgba(99,102,241,0.25)}
        .bp:active{transform:scale(.98);opacity:.85}
        .bx{padding:5px 10px;border-radius:8px;font-size:12px;background:transparent;color:var(--accent);border:none;cursor:pointer;font-family:inherit;transition:opacity .12s}
        .bx:active{opacity:.4}
        .qb{background:linear-gradient(135deg,rgba(99,102,241,0.1),rgba(139,92,246,0.07));border-radius:14px;padding:14px 18px;display:flex;align-items:flex-start;gap:10px}
        .qb i{color:var(--accent-light);font-size:11px;margin-top:3px;flex-shrink:0}
        .qb p{font-size:13px;line-height:1.6;color:var(--text-2)}
        .hs{padding:22px}
        .hs .lb{font-size:12px;color:var(--text-3);margin-bottom:6px}
        .hs .vl{font-size:36px;font-weight:700;line-height:1.1}
        .ms{padding:16px}
        .ms .lb{font-size:11px;color:var(--text-3);margin-bottom:4px}
        .ms .vl{font-size:18px;font-weight:700;line-height:1.2}
        .lr{display:flex;align-items:center;padding:10px 16px;min-height:42px;gap:10px}
        .lr:active{background:rgba(99,102,241,0.04)}
        .lsep{height:.5px;background:var(--sep);margin-left:46px}
        .ib{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
        .wc{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--sep-full);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;background:transparent;transition:all .2s}
        .wc:active{transform:scale(.84)}
        .wc.f{background:var(--accent-bg);border-color:var(--accent-light)}
        .cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
        .chd{text-align:center;font-size:10px;color:var(--text-3);padding:3px 0;font-weight:600}
        .cc{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text-2);transition:transform .1s;cursor:default}
        .cc:hover{transform:scale(1.18)}
        .cc.td{outline:1.5px solid var(--accent);outline-offset:-.5px;font-weight:700;color:var(--accent)}
        .st{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:7px;font-size:12px;cursor:pointer;background:var(--fill);color:var(--text-2);border:1px solid transparent;transition:all .15s;user-select:none}
        .st:active{transform:scale(.95)}
        .st input{display:none}
        .st:has(input:checked){background:var(--accent-bg);border-color:var(--accent-light);color:var(--accent);font-weight:500}
        .ii{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text-1);background:transparent;text-align:right;width:52px;padding:3px 0;border-bottom:1px solid var(--sep);transition:border-color .2s}
        .ii:focus{border-bottom-color:var(--accent)}
        .it{border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text-1);background:var(--fill);padding:6px 10px;border-radius:8px;flex:1;min-width:0}
        .it:focus{background:rgba(99,102,241,0.06)}
        .it::placeholder{color:var(--text-3)}
        input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
        .af{padding:8px 14px;background:rgba(232,234,242,0.5);display:flex;gap:8px;align-items:center}
        .af input{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;background:transparent;color:var(--text-1);padding:5px 0}
        .af input::placeholder{color:var(--text-3)}
        .tr{display:flex;align-items:center;gap:10px;padding:10px 14px;min-height:42px}
        .tr+.tr{border-top:.5px solid var(--sep)}
        .tr:active{background:rgba(99,102,241,0.03)}
        .tt{flex:1;font-size:14px}
        .tt.d{text-decoration:line-through;color:var(--text-3)}
        .tdb{width:26px;height:26px;border-radius:50%;border:none;background:transparent;cursor:pointer;color:var(--text-3);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .12s}
        .tdb:active{background:rgba(196,116,116,0.12);color:var(--phone)}
        .tsc{max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--sep-full) transparent}
        .tsc::-webkit-scrollbar{width:3px}
        .tsc::-webkit-scrollbar-thumb{background:var(--sep-full);border-radius:2px}
        .ch2{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
        .ch2 .ct{font-size:14px;font-weight:600}
        .cw{height:210px;position:relative;padding:4px 8px}
        .eh{padding:24px 14px;text-align:center;font-size:12px;color:var(--text-3)}
        .duo{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .water-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
        .water-row .wlb{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-right:4px;white-space:nowrap}
        .pomo-card{padding:16px 18px;text-align:center}
        .pomo-time{font-size:42px;font-weight:700;line-height:1.1;margin:8px 0 4px}
        .pomo-state{font-size:12px;color:var(--text-3);display:flex;align-items:center;justify-content:center;gap:5px}
        .pomo-count{font-size:12px;color:var(--text-3);margin-top:2px}
        .pomo-btns{display:flex;gap:8px;justify-content:center;margin-top:10px}
        .export-row{padding:10px 14px 14px}
        .btn-export{width:100%;padding:11px;border-radius:10px;font-size:13px;font-weight:500;background:var(--fill);color:var(--text-2);border:1px solid var(--sep-full);cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
        .btn-export:hover{background:rgba(99,102,241,0.08);color:var(--accent);border-color:rgba(99,102,241,0.2)}
        .btn-export:active{transform:scale(.98);opacity:.8}
        .toast{position:fixed;top:24px;left:50%;z-index:10000;padding:11px 22px;border-radius:12px;font-size:13px;font-family:inherit;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,0.15);transform:translate(-50%,-120%);transition:transform .3s cubic-bezier(.4,0,.2,1);white-space:nowrap}
        .toast.show{transform:translate(-50%,0)}
        .toast.ok{background:var(--accent)}
        .toast.err{background:#C1292E}
        @media(max-width:920px){.mg{grid-template-columns:1fr}.lc{position:static}}
        @media(max-width:480px){.bar-in{padding:12px 16px}.mg{gap:12px}.hs .vl{font-size:28px}.pomo-time{font-size:34px}.duo{grid-template-columns:1fr}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

<div id="ls">
    <div class="sp"></div>
    <div style="font-size:13px;color:var(--text-3)">同步云端数据...</div>
</div>

<div id="auth" style="display:none;">
    <div class="auth-box">
        <h3>首次使用：输入 GitHub Token</h3>
        <input id="tokenInput" type="password" placeholder="粘贴你的 GitHub Token">
        <button onclick="saveToken()">保存并同步</button>
    </div>
</div>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<nav id="bar">
    <div class="bar-in">
        <div class="bar-t"><i class="fa-solid fa-flask-vial"></i>科研打卡</div>
        <div class="bar-r">
            <span class="streak-badge"><i class="fa-solid fa-fire"></i><span id="streak">0</span>天</span>
            <span class="bar-d" id="bd"></span>
        </div>
    </div>
</nav>

<main style="max-width:1180px;margin:0 auto;padding:20px 28px 64px;position:relative;z-index:1">
<div id="app" class="mg">
    <aside class="lc">
        <div class="g hs">
            <div class="lb">今日学习时长</div>
            <div id="tst" class="vl mn" style="color:var(--primary-mid)">00:00:00</div>
            <div class="bt" style="margin-top:10px"><div id="sp" class="bf" style="width:0%;background:linear-gradient(90deg,var(--accent),var(--purple))"></div></div>
            <div style="display:flex;justify-content:space-between;margin-top:4px">
                <span style="font-size:11px;color:var(--text-3)">目标 8 小时</span>
                <span id="spc" class="mn" style="font-size:11px;color:var(--accent)">0%</span>
            </div>
        </div>
        <div class="g">
            <div class="lr">
                <div class="ib" style="background:var(--morning-bg);color:var(--morning)"><i class="fa-solid fa-sun"></i></div>
                <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">上午学习</div></div>
                <div class="pd" id="md"></div>
                <span id="mt" class="mn" style="font-size:15px;font-weight:600;min-width:82px;text-align:right">00:00:00</span>
                <button class="mb bi">开始</button>
            </div>
            <div class="lsep"></div>
            <div class="lr">
                <div class="ib" style="background:var(--afternoon-bg);color:var(--afternoon)"><i class="fa-solid fa-cloud-sun"></i></div>
                <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">下午学习</div></div>
                <div class="pd" id="ad"></div>
                <span id="at" class="mn" style="font-size:15px;font-weight:600;min-width:82px;text-align:right">00:00:00</span>
                <button class="ab bi">开始</button>
            </div>
            <div class="lsep"></div>
            <div class="lr">
                <div class="ib" style="background:var(--evening-bg);color:var(--evening)"><i class="fa-solid fa-moon"></i></div>
                <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500">晚间学习</div></div>
                <div class="pd" id="ed"></div>
                <span id="et" class="mn" style="font-size:15px;font-weight:600;min-width:82px;text-align:right">00:00:00</span>
                <button class="eb bi">开始</button>
            </div>
        </div>
        <div class="g pomo-card">
            <div style="display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:2px">
                <i class="fa-solid fa-stopwatch" style="font-size:11px;color:var(--accent-light)"></i>
                <span style="font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1px">番茄钟</span>
            </div>
            <div id="pomo-time" class="pomo-time mn" style="color:var(--primary-mid)">25:00</div>
            <div class="pomo-state">
                <div class="pd" id="pomo-dot"></div>
                <span id="pomo-state-text">准备专注</span>
            </div>
            <div class="pomo-count">今日 <span id="pomo-count" style="color:var(--accent);font-weight:600">0</span> 个番茄</div>
            <div class="pomo-btns">
                <button id="pomo-start" class="bi" style="padding:7px 20px;font-size:13px">开始专注</button>
                <button id="pomo-skip" class="bx" style="display:none;font-size:12px">跳过</button>
            </div>
        </div>
        <div class="duo">
            <div class="g ms">
                <div class="lb"><i class="fa-solid fa-broom" style="font-size:10px;margin-right:3px;opacity:.6"></i>杂活耗时</div>
                <div id="ct" class="vl mn" style="font-size:17px">00:00:00</div>
                <button id="tgc" class="bi" style="margin-top:6px;font-size:11px">开始计时</button>
            </div>
            <div class="g ms">
                <div class="lb"><i class="fa-solid fa-gamepad" style="font-size:10px;margin-right:3px;opacity:.6"></i>娱乐耗时</div>
                <div id="pt2" class="vl mn" style="font-size:17px">00:00:00</div>
                <button id="tgp" class="bi" style="margin-top:6px;font-size:11px">开始计时</button>
            </div>
        </div>
        <div class="g" style="padding:4px 0 0">
            <div class="ch2"><span class="ct">时间分布</span></div>
            <div class="cw"><canvas id="pc2"></canvas></div>
        </div>
    </aside>
    <section class="rc">
        <div class="qb">
            <i class="fa-solid fa-quote-left"></i>
            <p id="ptx">加载中...</p>
        </div>
        <div class="g">
            <div class="ch2">
                <div style="display:flex;align-items:center;gap:8px">
                    <span class="ct">今日任务</span>
                    <span id="tc" class="mn" style="font-size:11px;color:var(--accent)">0%</span>
                    <span id="tt" style="font-size:11px;color:var(--text-3)">0/0</span>
                </div>
                <button id="atb" class="bx"><i class="fa-solid fa-plus" style="font-size:10px;margin-right:2px"></i>添加</button>
            </div>
            <div class="bt" style="margin:0 14px"><div id="tp" class="bf" style="width:0%;background:linear-gradient(90deg,var(--accent),var(--purple))"></div></div>
            <div id="atf" style="display:none">
                <div class="af">
                    <input type="text" id="nti" placeholder="输入任务内容...">
                    <button id="ctb" class="bx" style="color:var(--text-3)">取消</button>
                    <button id="stb" class="bi" style="padding:5px 10px">保存</button>
                </div>
            </div>
            <div id="tl" class="tsc"></div>
        </div>
        <div class="g" style="padding:14px 18px">
            <div class="water-row">
                <span class="wlb"><i class="fa-solid fa-droplet" style="font-size:9px;margin-right:3px;opacity:.5"></i>八杯水</span>
                <div class="wc">🥛</div><div class="wc">🥛</div><div class="wc">🥛</div><div class="wc">🥛</div>
                <div class="wc">🥛</div><div class="wc">🥛</div><div class="wc">🥛</div><div class="wc">🥛</div>
            </div>
        </div>
        <div class="g">
            <div class="ch2"><span class="ct">每日学术任务</span></div>
            <div class="lr">
                <div class="ib" style="background:var(--morning-bg);color:var(--morning)"><i class="fa-solid fa-book-open"></i></div>
                <span style="flex:1;font-size:14px">文献阅读</span>
                <input type="number" id="pc" value="0" min="0" class="ii">
                <span style="font-size:12px;color:var(--text-3);width:18px">篇</span>
            </div>
            <div class="lsep"></div>
            <div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">
                <div style="display:flex;align-items:center;gap:10px">
                    <div class="ib" style="background:var(--afternoon-bg);color:var(--afternoon)"><i class="fa-solid fa-pen-nib"></i></div>
                    <span style="font-size:14px">论文写作</span>
                </div>
                <input type="text" id="ati" placeholder="论文标题" class="it" style="margin-left:38px">
                <div style="display:flex;align-items:center;gap:6px;margin-left:38px">
                    <input type="number" id="aw" value="0" min="0" class="ii">
                    <span style="font-size:12px;color:var(--text-3);width:18px">字</span>
                </div>
            </div>
            <div class="lsep" style="margin-left:14px"></div>
            <div style="padding:10px 14px;display:flex;flex-direction:column;gap:6px">
                <div style="display:flex;align-items:center;gap:10px">
                    <div class="ib" style="background:var(--evening-bg);color:var(--evening)"><i class="fa-solid fa-person-running"></i></div>
                    <span style="font-size:14px">运动锻炼</span>
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:5px;margin-left:38px">
                    <label class="st"><input type="checkbox" name="sport" value="健身"><i class="fa-solid fa-dumbbell" style="font-size:10px"></i> 健身</label>

<script>
// ==============================================

const GIST_ID = 30e325b4d2a46db808005a7c255cd77e;

let TOKEN = localStorage.getItem("gist_token");
let CLOUD = {
  study: {},
  tasks: [],
  daily: {},
  water: {},
  pomo: {},
  praise: null,
  praiseDate: null
};

// 同步工具
async function cloudGet() {
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      headers: { Authorization: `token ${TOKEN}` }
    });
    const gist = await res.json();
    if (!gist.files?.["data.json"]) return {};
    return JSON.parse(gist.files["data.json"].content) || {};
  } catch (e) {
    return {};
  }
}

async function cloudSave() {
  try {
    await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: "PATCH",
      headers: {
        "Authorization": `token ${TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        files: { "data.json": { content: JSON.stringify(CLOUD, null, 2) } }
      })
    });
  } catch (e) {}
}

function saveToken() {
  const t = document.getElementById("tokenInput").value.trim();
  if (!t) return;
  localStorage.setItem("gist_token", t);
  location.reload();
}

// 启动
window.onload = async () => {
  if (!TOKEN) {
    document.getElementById("ls").style.display = "none";
    document.getElementById("auth").style.display = "flex";
    return;
  }
  CLOUD = await cloudGet();
  document.getElementById("ls").style.display = "none";
  startApp();
};

// ======================
// 下面是你原来的完整逻辑
// ======================
function startApp() {
  var PL=["一天写不出500字，还想发C刊？做梦呢。","文献综述都懒得翻，你那论文跟厕纸没区别。","选题烂得像流水账，编辑看一眼直接拒稿。","别磨蹭了，再拖一年，你师兄都评副教授了。","查重率比你学习时间还高，凑字数谁不会啊？","连摘要都写不明白，活该投一篇拒一篇。","天天刷手机，C刊会自己砸你脸上？","理论框架都搭不起来，还敢说自己搞学术？","别人返修录用，你还在憋第一段，脸不红吗？","参考文献不更新，拿十年前的东西糊弄鬼呢？","文笔烂、逻辑差、选题水，三无稿件别投了丢人。","坐在桌前三小时，发呆两小时五十分钟，装什么努力。","C刊不看你的努力，只看你能不能写出人话。","连注释格式都调不对，学术素养基本为零。","拖延症没救了，等你写完，研究热点都凉透了。"];
  var T={morning:{r:false,s:0,i:null},afternoon:{r:false,s:0,i:null},evening:{r:false,s:0,i:null},chores:{r:false,s:0,i:null},phone:{r:false,s:0,i:null}};
  var pomo={state:'idle',remaining:25*60,interval:null,count:0};
  var tasks=CLOUD.tasks||[];
  var pie=null;

  function toast(m,t){var e=document.createElement('div');e.className='toast '+(t||'ok');e.textContent=m;document.body.appendChild(e);requestAnimationFrame(function(){requestAnimationFrame(function(){e.classList.add('show')})});setTimeout(function(){e.classList.remove('show');setTimeout(function(){e.remove()},300)},2400)}
  function getStreak(){var streak=0,d=new Date();d.setHours(0,0,0,0);while(true){var key=d.toISOString().split('T')[0];var sd=CLOUD.study?.[key];if(sd&&(sd.ms||0)+(sd.as||0)+(sd.es||0)>0){streak++;d.setDate(d.getDate()-1)}else break;}return streak;}
  function updateStreak(){document.getElementById('streak').textContent=getStreak()}

  function initWater(){var today=new Date().toDateString();var w=CLOUD.water?.[today]||Array(8).fill(false);document.querySelectorAll('.wc').forEach((c,i)=>{if(w[i]){c.classList.add('f');c.textContent='💧'}c.onclick=()=>{w[i]=!w[i];if(!CLOUD.water)CLOUD.water={};CLOUD.water[today]=w;cloudSave();if(w[i]){c.classList.add('f');c.textContent='💧'}else{c.classList.remove('f');c.textContent='🥛'}};});}

  function initPraise(){var td=new Date().toDateString();if(CLOUD.praiseDate!==td){var t=PL[Math.floor(Math.random()*PL.length)];CLOUD.praise=t;CLOUD.praiseDate=td;cloudSave();}document.getElementById('ptx').textContent=CLOUD.praise||'别摸鱼了';}

  function fmt(s){return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
  function fmtMm(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}

  function loadDay(){var d=new Date().toISOString().split('T')[0];var sd=CLOUD.study?.[d]||{};T.morning.s=sd.ms||0;T.afternoon.s=sd.as||0;T.evening.s=sd.es||0;document.getElementById('mt').textContent=fmt(T.morning.s);document.getElementById('at').textContent=fmt(T.afternoon.s);document.getElementById('et').textContent=fmt(T.evening.s);}
  function saveDay(){var d=new Date().toISOString().split('T')[0];if(!CLOUD.study)CLOUD.study={};CLOUD.study[d]={ms:T.morning.s,as:T.afternoon.s,es:T.evening.s};cloudSave();}

  function loadPomo(){var today=new Date().toDateString();pomo.count=CLOUD.pomo?.[today]||0;pomo.state='idle';pomo.remaining=25*60;pomo.interval=null;updatePomoUI();}
  function savePomo(){var today=new Date().toDateString();if(!CLOUD.pomo)CLOUD.pomo={};CLOUD.pomo[today]=pomo.count;cloudSave();}

  function pomoToggle(){if(pomo.state==='idle'){pomo.state='focus';pomo.remaining=25*60;pomoTick();}else{if(pomo.interval){clearInterval(pomo.interval);pomo.interval=null}else pomoTick();}updatePomoUI();}
  function pomoSkip(){if(pomo.state==='focus'){pomo.count++;savePomo();var pcEl=document.getElementById('pc');pcEl.value=parseInt(pcEl.value||0)+1;pomo.state='break';pomo.remaining=5*60;toast('专注完成，文献阅读 +1');}else if(pomo.state==='break'){pomo.state='idle';pomo.remaining=25*60;toast('休息已跳过');}clearInterval(pomo.interval);pomo.interval=null;updatePomoUI();}
  function pomoTick(){clearInterval(pomo.interval);pomo.interval=setInterval(()=>{pomo.remaining--;if(pomo.remaining<=0){if(pomo.state==='focus'){pomo.count++;savePomo();var pcEl=document.getElementById('pc');pcEl.value=parseInt(pcEl.value||0)+1;pomo.state='break';pomo.remaining=5*60;toast('专注完成，文献阅读 +1，休息5分钟');}else if(pomo.state==='break'){pomo.state='idle';pomo.remaining=25*60;toast('休息结束，准备下一个番茄');clearInterval(pomo.interval);pomo.interval=null;}updatePomoUI();}document.getElementById('pomo-time').textContent=fmtMm(pomo.remaining);},1000);}
  function updatePomoUI(){document.getElementById('pomo-time').textContent=fmtMm(pomo.remaining);var sm={idle:'准备专注',focus:'专注中',break:'休息中'};document.getElementById('pomo-state-text').textContent=sm[pomo.state];document.getElementById('pomo-count').textContent=pomo.count;var dot=document.getElementById('pomo-dot');if(pomo.state!=='idle'&&pomo.interval)dot.classList.add('on');else dot.classList.remove('on');var sb=document.getElementById('pomo-start'),sk=document.getElementById('pomo-skip');if(pomo.state==='idle'){sb.textContent='开始专注';sb.classList.remove('ac');sk.style.display='none';}else{sb.textContent=pomo.interval?'暂停':'继续';if(pomo.interval)sb.classList.remove('ac');else sb.classList.add('ac');sk.style.display='';sk.textContent=pomo.state==='focus'?'跳过':'跳过休息';}}

  function startT(k){if(T[k].r)return;T[k].r=true;T[k].i=setInterval(()=>{T[k].s++;var elId=k==='chores'?'ct':k==='phone'?'pt2':k==='morning'?'mt':k==='afternoon'?'at':'et';document.getElementById(elId).textContent=fmt(T[k].s);updateAll();},1000);}
  function stopT(k){clearInterval(T[k].i);T[k].r=false;saveDay();updateStreak();}
  function toggle(k){var is=(k==='morning'||k==='afternoon'||k==='evening');var bm={morning:document.querySelector('.mb'),afternoon:document.querySelector('.ab'),evening:document.querySelector('.eb'),chores:document.getElementById('tgc'),phone:document.getElementById('tgp')};var dm={morning:document.getElementById('md'),afternoon:document.getElementById('ad'),evening:document.getElementById('ed')};if(!T[k].r){startT(k);bm[k].textContent=is?'结束':'停止';bm[k].classList.add('ac');if(dm[k])dm[k].classList.add('on');}else{stopT(k);bm[k].textContent=is?'开始':'开始计时';bm[k].classList.remove('ac');if(dm[k])dm[k].classList.remove('on');}}

  function updateAll(){var total=T.morning.s+T.afternoon.s+T.evening.s;document.getElementById('tst').textContent=fmt(total);var pct=Math.min(100,(total/28800)*100);document.getElementById('spc').textContent=Math.round(pct)+'%';document.getElementById('sp').style.width=pct+'%';updatePie();updateTP();}

  function initPie(){var ctx=document.getElementById('pc2').getContext('2d');pie=new Chart(ctx,{type:'doughnut',data:{labels:['上午','下午','晚间','杂活','娱乐'],datasets:[{data:[1,1,1,1,1],backgroundColor:['#4A90A4','#5A8F5C','#A06878','#C4A44D','#C47474'],borderWidth:0,hoverOffset:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'-apple-system,Noto Sans SC',weight:500},color:'#3D4260',padding:14,usePointStyle:true}}},cutout:'60%'}});}
  function updatePie(){if(!pie)return;pie.data.datasets[0].data=[T.morning.s,T.afternoon.s,T.evening.s,T.chores.s,T.phone.s];pie.update('none');}

  function renderTasks(){var l=document.getElementById('tl');l.innerHTML='';if(!tasks.length){l.innerHTML='<div class="eh">暂无任务，点击上方添加</div>';return;}tasks.forEach((t,i)=>{var r=document.createElement('div');r.className='tr';r.innerHTML=`<input type="checkbox" ${t.done?'checked':''} data-i="${i}"><span class="tt ${t.done?'d':''}">${t.text}</span><button class="tdb" data-i="${i}">&times;</button>`;l.appendChild(r);});l.querySelectorAll('input[type="checkbox"]').forEach(c=>{c.onchange=()=>{tasks[c.dataset.i].done=!tasks[c.dataset.i].done;CLOUD.tasks=tasks;cloudSave();renderTasks();}});l.querySelectorAll('.tdb').forEach(b=>{b.onclick=()=>{tasks.splice(b.dataset.i,1);CLOUD.tasks=tasks;cloudSave();renderTasks();}});}
  function updateTP(){if(!tasks.length){document.getElementById('tc').textContent='0%';document.getElementById('tp').style.width='0%';document.getElementById('tt').textContent='0/0';return;}var c=tasks.filter(x=>x.done).length;var p=(c/tasks.length)*100;document.getElementById('tc').textContent=Math.round(p)+'%';document.getElementById('tp').style.width=p+'%';document.getElementById('tt').textContent=c+'/'+tasks.length;}

  function loadDaily(){var today=new Date().toDateString();var d=CLOUD.daily?.[today]||{};document.getElementById('pc').value=d.paper||0;document.getElementById('ati').value=d.title||'';document.getElementById('aw').value=d.word||0;document.getElementById('sm').value=d.sportMin||0;if(d.sportItems)document.querySelectorAll('input[name="sport"]').forEach(i=>{i.checked=d.sportItems.includes(i.value);});}
  function saveDaily(){var today=new Date().toDateString();var o={paper:document.getElementById('pc').value,title:document.getElementById('ati').value,word:document.getElementById('aw').value,sportMin:document.getElementById('sm').value,sportItems:Array.from(document.querySelectorAll('input[name="sport"]:checked')).map(i=>i.value)};if(!CLOUD.daily)CLOUD.daily={};CLOUD.daily[today]=o;cloudSave();toast('保存成功');}

  function renderHeatmap(){var c=document.getElementById('hc');c.innerHTML='';var td=new Date(),y=td.getFullYear(),m=td.getMonth(),fd=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),tdn=td.getDate();for(var i=0;i<fd;i++)c.appendChild(document.createElement('div'));for(var d=1;d<=days;d++){var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var sd=CLOUD.study?.[ds]||{};var ts=(sd.ms||0)+(sd.as||0)+(sd.es||0);var th=ts/3600;var cl=document.createElement('div');cl.className='cc';if(d===tdn)cl.classList.add('td');cl.textContent=d;if(th>=8){cl.style.background='#4338CA';cl.style.color='#fff'}else if(th>=5){cl.style.background='#6366F1';cl.style.color='#fff'}else if(th>=2){cl.style.background='#A5B4FC'}else if(th>0){cl.style.background='#E0E7FF'}else{cl.style.background='var(--fill)'}c.appendChild(cl);}}

  async function exportReport(){var today=new Date(),dow=today.getDay();var monOff=dow===0?-6:1-dow;var monday=new Date(today);monday.setDate(today.getDate()+monOff);var days=[];var totalH=0,maxH=0,totalPomo=0;for(var i=0;i<7;i++){var dd=new Date(monday);dd.setDate(monday.getDate()+i);var ds=dd.toISOString().split('T')[0];var sd=CLOUD.study?.[ds]||{};var h=((sd.ms||0)+(sd.as||0)+(sd.es||0))/3600;days.push({date:dd,hours:h});totalH+=h;if(h>maxH)maxH=h;totalPomo+=CLOUD.pomo?.[dd.toDateString()]||0;}var streak=getStreak();var card=document.createElement('div');card.style.cssText='position:fixed;left:-9999px;top:0;width:560px;padding:36px;background:linear-gradient(145deg,#F0F1F8,#E0E2EE);border-radius:20px;font-family:-apple-system,Noto Sans SC';card.innerHTML=`<div style=font-size:20px;font-weight:700>科研周报</div><div style=font-size:13px;color:#8B8FA8;margin-bottom:24px>${days[0].date.getMonth()+1}月${days[0].date.getDate()}日-${days[6].date.getMonth()+1}月${days[6].date.getDate()}日</div><div style=display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px><div style=background:rgba(255,255,255
