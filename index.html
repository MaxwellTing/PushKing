<!-- 只需要替换 <script> 标签里的 pullCloud 和 pushCloud 两个函数 -->
<!-- 其他所有代码保持不变 -->

<script>
/* 替换原来的 pullCloud 函数 */
function pullCloud(){
    saveSyncCfg();
    persistAllTimers();
    var key=document.getElementById('sync-key').value.trim(),
        bin=document.getElementById('sync-bin').value.trim();
    if(!key||!bin){toast('请先填写 API Key 和 Bin ID','err');return}

    toast('正在拉取...');

    /* 15秒超时保底：防止 fetch 静默挂起导致无任何提示 */
    var controller=new AbortController();
    var timer=setTimeout(function(){controller.abort()},15000);

    fetch('https://api.jsonbin.io/v3/b/'+bin+'/latest',{
        headers:{'X-Master-Key':key},
        signal:controller.signal
    })
    .then(function(r){
        clearTimeout(timer);
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.json();
    })
    .then(function(json){
        var data=json.record;
        if(!data)throw new Error('云端返回空数据');
        /* 兼容 record 被包装成数组的情况 */
        if(Array.isArray(data))data=data[0]||{};
        if(typeof data!=='object'||Array.isArray(data))throw new Error('数据格式异常');
        var keys=Object.keys(data);
        if(!keys.length)throw new Error('数据内容为空');
        keys.forEach(function(k){
            var val=data[k];
            /* 统一转字符串写入 localStorage */
            localStorage.setItem(k,typeof val==='string'?val:JSON.stringify(val));
        });
        toast('拉取成功，即将刷新');
        setTimeout(function(){location.reload()},1200);
    })
    .catch(function(e){
        clearTimeout(timer);
        var msg=e.name==='AbortError'
            ?'请求超时（15秒无响应），请检查网络或 Bin ID'
            :'拉取失败：'+e.message;
        toast(msg,'err');
    });
}

/* 替换原来的 pushCloud 函数 */
function pushCloud(){
    saveSyncCfg();
    /* 推送前强制把当前内存中的计时器秒数写入 localStorage */
    persistAllTimers();
    var key=document.getElementById('sync-key').value.trim(),
        bin=document.getElementById('sync-bin').value.trim();
    if(!key||!bin){toast('请先填写 API Key 和 Bin ID','err');return}

    toast('正在推送...');

    var controller=new AbortController();
    var timer=setTimeout(function(){controller.abort()},15000);

    fetch('https://api.jsonbin.io/v3/b/'+bin,{
        method:'PUT',
        headers:{'Content-Type':'application/json','X-Master-Key':key,'X-Bin-Private':false},
        body:JSON.stringify(collectData()),
        signal:controller.signal
    })
    .then(function(r){
        clearTimeout(timer);
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.json();
    })
    .then(function(){toast('推送成功')})
    .catch(function(e){
        clearTimeout(timer);
        var msg=e.name==='AbortError'
            ?'请求超时（15秒无响应），请检查网络或 Bin ID'
            :'推送失败：'+e.message;
        toast(msg,'err');
    });
}
</script>
